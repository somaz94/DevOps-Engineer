name: Backup GitHub to GitLab

on:
  push:
    branches:
      - main
    paths-ignore:
      - .github/workflows/*
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

# Mirror is a one-way push to GitLab — the only GitHub-side need is
# `actions/checkout` reading this repo's contents. Anything beyond that
# (issues, packages, pull-requests) is left at the default (none).
permissions:
  contents: read

# Serialize mirror pushes. cancel-in-progress: false because force-pushing
# `--all` is non-atomic — interrupting a run mid-push can leave GitLab with
# partial refs. Letting the in-flight run finish keeps the mirror
# consistent.
concurrency:
  group: gitlab-mirror
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"

      - name: Create Wiki Directory
        run: mkdir -p wiki

      - name: Checkout Wiki Repository
        run: |
          git clone https://github.com/somaz94/DevOps-Engineer.wiki.git temp_wiki

      - name: Copy Wiki Content
        run: |
          cp temp_wiki/*.md wiki/
          rm -rf temp_wiki

      - name: Check for Changes
        id: git-check
        run: |
          git add wiki/
          git status --porcelain
          echo "changes=$(git status --porcelain | wc -l)" >> $GITHUB_OUTPUT

      - name: Commit Wiki Changes if Any
        if: steps.git-check.outputs.changes != '0'
        run: |
          git commit -m "Update wiki backup" -a

      - name: Mirror to GitLab
        uses: somaz94/multi-git-mirror@v1
        with:
          targets: |
            gitlab::https://gitlab.com/backup6695808/DevOps-Engineer.git
          gitlab_token: ${{ secrets.GITLAB_TOKEN }}
          mirror_branches: 'all'
          mirror_tags: 'true'
          force_push: 'true'
